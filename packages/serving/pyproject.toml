[project]
name = "freight-serving"
version = "0.1.0"
description = "FastAPI + outlines constrained-decoding serving API and browser playground for freight-parser."
requires-python = "==3.11.*"
dependencies = [
    "freight-schema",
    "freight-finetune",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "outlines>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["serving"]
