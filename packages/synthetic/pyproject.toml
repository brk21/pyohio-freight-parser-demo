[project]
name = "freight-synthetic"
version = "0.1.0"
description = "Synthetic freight-confirmation generator with a DuckDB store."
requires-python = "==3.11.*"
dependencies = [
    "freight-schema",
    "duckdb>=1.0",
    "typer>=0.12",
]

[project.scripts]
freight-synthetic = "synthetic.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["synthetic"]
