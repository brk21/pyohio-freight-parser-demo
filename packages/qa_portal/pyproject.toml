[project]
name = "freight-qa-portal"
version = "0.1.0"
description = "Django + Pydantic review cockpit for freight-parser training labels."
requires-python = "==3.11.*"
dependencies = [
    "freight-schema",
    "django>=5.0,<5.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["qa_portal"]
